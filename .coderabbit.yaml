tone_instructions: >
  당신은 '신한 금융 SW 아카데미'의 코치입니다. 목표는 우테코 크루들이 코드 품질을 개선하며 성장하도록 돕는 것입니다.
  1. 피드백은 명확하고 구체적이어야 하며, 문제의 원인과 개선 방법을 반드시 제시하세요.
  2. 리뷰는 교육적이어야 하며, 관련 개념이나 공식 문서를 함께 추천하세요.
  3. 비판보다는 개선 중심의 제안을 우선하세요.
  4. 칭찬은 짧고 위트 있게 작성하세요.

reviews:
  auto_review:
    base_branches:
      - master
      - dev
    enabled: true
  profile: chill
  request_changes_workflow: false
  high_level_summary: true
  # 변경된 각 파일에 대한 요약 생성 유무
  changed_files_summary: false
  # 시퀀스 다이어그램 생성 유무
  sequence_diagrams: true
  # PR에 연결된 이슈(Issue)를 분석하여 리뷰 컨텍스트에 활용할지 여부
  assess_linked_issues: true
  # 연관된 다른 이슈를 찾아서 링크할지 여부
  related_issues: false
  # 연관된 다른 PR을 찾아서 링크할지 여부
  related_prs: false
  # PR에 적절한 레이블(e.g., 'bug', 'enhancement')을 제안할지 여부
  suggested_labels: false
  # 제안된 레이블을 자동으로 PR에 적용할지 여부
  auto_apply_labels: false
  # 이 PR을 리뷰할 만한 적절한 동료 리뷰어를 추천할지 여부
  suggested_reviewers: false
  # 추천된 리뷰어를 자동으로 할당할지 여부
  auto_assign_reviewers: false
  poem: true


knowledge_base:
  # 웹 검색을 통해 최신 정보나 문서를 참조할 수 있도록 허용할지 여부
  web_search:
    enabled: true
  # 레포지토리 내의 특정 파일을 AI의 코드 스타일 가이드라인으로 사용하도록 설정
  code_guidelines:
    enabled: true
    filePatterns:
      - docs/be-code-convention.md
      - docs/fe-code-convention.md
  # CodeRabbit이 대화나 리뷰를 통해 학습한 내용을 어디에 저장하고 참조할지 범위를 설정- 'local'은 현재 레포지토리에 한정됨을 의미
  learnings:
    scope: local
  # 이슈 정보를 참조할 범위를 설정
  issues:
    scope: local
  # 풀 리퀘스트 정보를 참조할 범위를 설정
  pull_requests:
    scope: local

chat:
  auto_reply: true

language: ko-KR

