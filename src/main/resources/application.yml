server:
  port: 8083

info:
  app:
    name: EcoDrive-pay
    description: Payment service for GORANI
    version: 0.0.1

logging:
  level:
    org.springframework.security.web: trace
    com.gorani.ddeonam: debug
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace

jwt:
  secret: ${JWT_SECRET}

spring:
  application:
    name: EcoDrive_Pay
  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/pay/login/oauth2/code/{registrationId}"
            scope:
              - profile_nickname
              - account_email
            client-name: Kakao
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true

  main:
    banner-mode: console

app:
  cdn-url: https://${AWS_BUCKET_NAME}.s3.ap-northeast-2.amazonaws.com
  auth:
    internal-token: ${INTERNAL_TOKEN}
  checkout:
    base-url: ${PAY_PUBLIC_BASE_URL:http://localhost:8083}
    merchant-policy:
      default-allowed-integrations: []
      merchants:
        ecodrive:
          allowed-integrations:
            - INTERNAL_TOKEN
            - PAY_LOGIN
        coopang-market:
          allowed-integrations:
            - PAY_LOGIN
  toss:
    secret-key: ${TOSS_SECRET_KEY}
    url: https://api.tosspayments.com/v1/payments/confirm

cloud:
  aws:
    credentials:
      access-key: ${AWS_ACCESS_KEY}
      secret-key: ${AWS_SECRET_KEY}
    region:
      static: ap-northeast-2
    s3:
      bucket: ${AWS_BUCKET_NAME}

management:
  endpoints:
    web:
      base-path: /actuator
  endpoint:
    health:
      show-components: always
