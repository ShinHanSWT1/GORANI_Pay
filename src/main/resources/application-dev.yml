spring:
  config:
    activate:
      on-profile: dev

  datasource:
    driver-class-name: org.postgresql.Driver
    url:  ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
  security:
    oauth2:
      client:
        registration:
          kakao:
            redirect-uri: "https://dev-gorani.lab.terminal-lab.kr/pay/login/oauth2/code/kakao"

logging:
  level:
    org.springframework.boot.actuate: INFO

app:
  upload:
    path: /app/uploads
  checkout:
    base-url: https://dev-gorani.lab.terminal-lab.kr/pay
